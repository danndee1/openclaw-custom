name: Build and Push OpenClaw Custom Image

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.extra.txt
      - .github/workflows/build-and-push.yml

env:
  UPSTREAM_IMAGE: 1186258278/openclaw-zh:nightly
  IMAGE_NAME: openclaw-custom
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream digest
        id: upstream
        run: |
          set -euo pipefail
          DIGEST="$(docker buildx imagetools inspect "${UPSTREAM_IMAGE}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          SHORT="${DIGEST#sha256:}"
          SHORT="${SHORT:0:12}"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "short=${SHORT}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ env.UPSTREAM_IMAGE }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:upstream-${{ steps.upstream.outputs.short }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.description=OpenClaw custom wrapper image with persistent-friendly runtime dependencies
            org.opencontainers.image.upstream=${{ env.UPSTREAM_IMAGE }}
            org.opencontainers.image.upstream-digest=${{ steps.upstream.outputs.digest }}
